<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="팀 일정 공유 앱">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="팀 일정표">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>팀 일정표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --accent: #4fc3f7;
  --accent2: #81c784;
  --danger: #ef5350;
  --warn: #ffb74d;
  --pink: #f48fb1;
  --purple: #ce93d8;
  --text: #e8eaf6;
  --text2: #90a4ae;
  --border: rgba(255,255,255,0.08);
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* Header */
.header {
  background: var(--surface);
  padding: 1rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
.app-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.app-title span { color: var(--accent); }
.share-btn {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}

/* Month nav */
.month-nav { display: flex; align-items: center; justify-content: space-between; }
.nav-arrow {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  width: 32px; height: 32px;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.month-label { font-size: 15px; font-weight: 500; }

/* Calendar */
.cal-wrap { padding: 1rem; }
.cal-days-header {
  display: grid; grid-template-columns: repeat(7,1fr);
  text-align: center;
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 6px;
}
.cal-days-header span:first-child { color: #ef5350; }
.cal-days-header span:last-child { color: var(--accent); }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 2px;
}
.day-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 2px 2px;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  transition: background 0.15s;
}
.day-cell:hover { background: rgba(255,255,255,0.05); }
.day-cell.selected { background: rgba(79,195,247,0.15); }
.day-cell.today .day-num {
  background: var(--accent);
  color: #000;
  border-radius: 50%;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
}
.day-cell.other-month .day-num { color: rgba(255,255,255,0.2); }
.day-cell:first-child .day-num, .day-cell:nth-child(7n+1) .day-num { color: #ef5350; }
.day-cell:nth-child(7n) .day-num { color: var(--accent); }
.day-num { font-size: 13px; font-weight: 400; line-height: 24px; width: 24px; text-align: center; }
.dot-row { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; justify-content: center; }
.dot { width: 5px; height: 5px; border-radius: 50%; }

/* Bottom section */
.section { padding: 0 1rem 1rem; }
.section-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.filter-tag {
  background: rgba(79,195,247,0.15);
  color: var(--accent);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 11px;
  cursor: pointer;
}

/* Add form */
.add-form {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
}
.form-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: block; }
.form-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  padding: 10px 12px;
  margin-bottom: 10px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.color-pick { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.cpick {
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.15s;
}
.cpick.on { border-color: white; transform: scale(1.2); }
.submit-btn {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.2s;
}
.submit-btn:hover { opacity: 0.85; }

/* Event cards */
.event-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  border-left: 3px solid;
}
.ev-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.ev-title { font-size: 14px; font-weight: 500; flex: 1; }
.ev-del {
  background: none; border: none; color: var(--text2);
  cursor: pointer; font-size: 16px; line-height: 1;
  padding: 0 2px;
}
.ev-meta { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.ev-memo { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; font-style: italic; }
.comments { border-top: 1px solid var(--border); padding-top: 8px; }
.comment-item {
  font-size: 12px;
  color: var(--text2);
  padding: 3px 0 3px 10px;
  border-left: 2px solid var(--border);
  margin-bottom: 3px;
}
.comment-form { display: flex; gap: 6px; margin-top: 6px; }
.comment-input {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  padding: 6px 10px;
  outline: none;
}
.comment-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--accent);
  font-size: 12px;
  padding: 6px 12px;
  cursor: pointer;
  font-family: inherit;
}

/* Legend */
.legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Empty */
.empty { text-align: center; padding: 2rem 0; color: var(--text2); font-size: 13px; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #000;
  border-radius: 20px; padding: 8px 20px;
  font-size: 13px; font-weight: 700;
  display: none; z-index: 999;
  white-space: nowrap;
}

/* Loading */
.loading { text-align: center; padding: 2rem; color: var(--text2); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">Green <span>Chem</span> 일정표</div>
    <button class="share-btn" onclick="shareLink()">링크 공유</button>
  </div>
  <div class="month-nav">
    <button class="nav-arrow" onclick="changeMonth(-1)">&#8249;</button>
    <span class="month-label" id="month-label"></span>
    <button class="nav-arrow" onclick="changeMonth(1)">&#8250;</button>
  </div>
</div>

<div class="cal-wrap">
  <div class="cal-days-header">
    <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="section">
  <div class="legend" id="legend"></div>

  <div class="add-form">
    <div class="color-pick" id="color-pick"></div>
    <label class="form-label">일정 제목 *</label>
    <input class="form-input" id="f-title" placeholder="예: 팀 미팅, 보고서 제출..." />
    <div class="form-row">
      <div>
        <label class="form-label">날짜 *</label>
        <input class="form-input" type="date" id="f-date" />
      </div>
      <div>
        <label class="form-label">담당자</label>
        <input class="form-input" id="f-who" placeholder="이름" />
      </div>
    </div>
    <label class="form-label">메모</label>
    <input class="form-input" id="f-memo" placeholder="간단한 메모..." />
    <button class="submit-btn" onclick="addEvent()">+ 일정 추가</button>
  </div>

  <div class="section-title">
    <span id="list-title">이번 달 일정</span>
    <span class="filter-tag" id="filter-tag" style="display:none" onclick="clearFilter()">✕ 필터 해제</span>
  </div>
  <div id="events-list"><div class="loading">불러오는 중...</div></div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc, arrayUnion, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB51316UkujU9WeXxl5kJOw21DoTUsagGc",
  authDomain: "green-chem-2ad70.firebaseapp.com",
  projectId: "green-chem-2ad70",
  storageBucket: "green-chem-2ad70.firebasestorage.app",
  messagingSenderId: "313472584854",
  appId: "1:313472584854:web:6b40206db55667632686b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const eventsCol = collection(db, "events");

const CATS = [
  { color: "#4fc3f7", label: "업무" },
  { color: "#81c784", label: "미팅" },
  { color: "#ef5350", label: "마감" },
  { color: "#f48fb1", label: "휴가" },
  { color: "#ce93d8", label: "기타" },
];

let selectedColor = CATS[0].color;
let selectedLabel = CATS[0].label;
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let filterDate = null;
let allEvents = [];

// Color picker
function buildColorPick() {
  const cp = document.getElementById("color-pick");
  cp.innerHTML = "";
  CATS.forEach((c, i) => {
    const d = document.createElement("div");
    d.className = "cpick" + (i === 0 ? " on" : "");
    d.style.background = c.color;
    d.title = c.label;
    d.onclick = () => {
      document.querySelectorAll(".cpick").forEach(x => x.classList.remove("on"));
      d.classList.add("on");
      selectedColor = c.color;
      selectedLabel = c.label;
    };
    cp.appendChild(d);
  });
}

// Legend
function buildLegend() {
  const leg = document.getElementById("legend");
  leg.innerHTML = CATS.map(c =>
    `<div class="leg-item"><div class="leg-dot" style="background:${c.color}"></div>${c.label}</div>`
  ).join("");
}

// Calendar
function renderCalendar() {
  const grid = document.getElementById("cal-grid");
  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth - 1, 0).getDate();
  document.getElementById("month-label").textContent = `${currentYear}년 ${currentMonth}월`;
  grid.innerHTML = "";

  const makeDS = (y, m, d) => `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

  for (let i = 0; i < firstDay; i++) {
    const d = prevDays - firstDay + 1 + i;
    const m = currentMonth === 1 ? 12 : currentMonth - 1;
    const y = currentMonth === 1 ? currentYear - 1 : currentYear;
    addCell(grid, d, makeDS(y, m, d), true);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = makeDS(currentYear, currentMonth, d);
    const isToday = today.getFullYear() === currentYear && today.getMonth() + 1 === currentMonth && today.getDate() === d;
    addCell(grid, d, ds, false, isToday);
  }
  const remaining = 42 - firstDay - daysInMonth;
  for (let d = 1; d <= remaining; d++) {
    const m = currentMonth === 12 ? 1 : currentMonth + 1;
    const y = currentMonth === 12 ? currentYear + 1 : currentYear;
    addCell(grid, d, makeDS(y, m, d), true);
  }
}

function addCell(grid, d, ds, otherMonth, isToday) {
  const cell = document.createElement("div");
  cell.className = "day-cell" + (otherMonth ? " other-month" : "") + (isToday ? " today" : "") + (filterDate === ds ? " selected" : "");
  const evs = allEvents.filter(e => e.date === ds);
  const dots = evs.slice(0, 3).map(e => `<div class="dot" style="background:${e.color}"></div>`).join("");
  cell.innerHTML = `<div class="day-num">${d}</div><div class="dot-row">${dots}</div>`;
  cell.onclick = () => { filterDate = filterDate === ds ? null : ds; renderAll(); };
  grid.appendChild(cell);
}

// Events list
function renderList() {
  const list = document.getElementById("events-list");
  const title = document.getElementById("list-title");
  const tag = document.getElementById("filter-tag");
  let filtered = filterDate
    ? allEvents.filter(e => e.date === filterDate)
    : allEvents.filter(e => {
        const [y, m] = e.date.split("-").map(Number);
        return y === currentYear && m === currentMonth;
      });
  filtered.sort((a, b) => a.date.localeCompare(b.date));

  if (filterDate) {
    const d = new Date(filterDate + "T00:00:00");
    const days = ["일","월","화","수","목","금","토"];
    title.textContent = `${filterDate} (${days[d.getDay()]})`;
    tag.style.display = "inline";
  } else {
    title.textContent = `${currentMonth}월 일정`;
    tag.style.display = "none";
  }

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">등록된 일정이 없습니다</div>';
    return;
  }

  list.innerHTML = filtered.map(ev => {
    const d = new Date(ev.date + "T00:00:00");
    const days = ["일","월","화","수","목","금","토"];
    const ds = `${ev.date} (${days[d.getDay()]})`;
    const cmts = (ev.comments || []).map(c => `<div class="comment-item">${c}</div>`).join("");
    return `
      <div class="event-card" style="border-left-color:${ev.color}">
        <div class="ev-header">
          <div class="ev-title">${ev.title}</div>
          <button class="ev-del" onclick="delEvent('${ev.id}')">✕</button>
        </div>
        <div class="ev-meta">${ds}${ev.who ? " · " + ev.who : ""}</div>
        ${ev.memo ? `<div class="ev-memo">${ev.memo}</div>` : ""}
        <div class="comments">
          ${cmts}
          <div class="comment-form">
            <input class="comment-input" id="cmt-${ev.id}" placeholder="댓글 추가..." onkeydown="if(event.key==='Enter') window._addComment('${ev.id}', this)" />
            <button class="comment-btn" onclick="window._addComment('${ev.id}', document.getElementById('cmt-${ev.id}'))">등록</button>
          </div>
        </div>
      </div>`;
  }).join("");
}

function renderAll() { renderCalendar(); renderList(); }

// Firestore realtime
onSnapshot(query(eventsCol, orderBy("date")), snap => {
  allEvents = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderAll();
});

// Add event
window.addEvent = async () => {
  const title = document.getElementById("f-title").value.trim();
  const date = document.getElementById("f-date").value;
  const who = document.getElementById("f-who").value.trim();
  const memo = document.getElementById("f-memo").value.trim();
  if (!title || !date) { showToast("제목과 날짜를 입력해주세요"); return; }
  await addDoc(eventsCol, { title, date, who, memo, color: selectedColor, label: selectedLabel, comments: [], createdAt: Date.now() });
  document.getElementById("f-title").value = "";
  document.getElementById("f-who").value = "";
  document.getElementById("f-memo").value = "";
  showToast("일정이 추가됐습니다 ✓");
};

// Delete event
window.delEvent = async (id) => {
  if (!confirm("이 일정을 삭제할까요?")) return;
  await deleteDoc(doc(db, "events", id));
  showToast("삭제됐습니다");
};

// Add comment
window._addComment = async (id, input) => {
  const val = input.value.trim();
  if (!val) return;
  await updateDoc(doc(db, "events", id), { comments: arrayUnion(val) });
  input.value = "";
};

// Month nav
window.changeMonth = (d) => {
  currentMonth += d;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  filterDate = null;
  renderAll();
};

window.clearFilter = () => { filterDate = null; renderAll(); };

// Share
window.shareLink = () => {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => showToast("링크가 복사됐습니다!")).catch(() => showToast(url));
};

// Toast
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2200);
}

// Init
const today = new Date();
const pad = n => String(n).padStart(2, "0");
document.getElementById("f-date").value = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
buildColorPick();
buildLegend();
renderCalendar();
</script>

<!-- PWA Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>

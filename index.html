<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f1a">
<meta name="description" content="Green Chem 설비 일정표">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="설비 일정표">
<link rel="manifest" href="manifest.json">
<title>Green Chem 설비 일정표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --text: #e8eaf6;
  --text2: #90a4ae;
  --border: rgba(255,255,255,0.08);
  --radius: 14px;
  --accent: #4fc3f7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 520px; margin: 0 auto; }

.header { background: var(--surface); padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
.app-title { font-size: 17px; font-weight: 700; }
.app-title span { color: var(--accent); }
.share-btn { background: var(--accent); color: #000; border: none; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.month-nav { display: flex; align-items: center; justify-content: space-between; }
.nav-arrow { background: none; border: 1px solid var(--border); color: var(--text); border-radius: 8px; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.month-label { font-size: 15px; font-weight: 500; }

.cal-wrap { padding: 1rem; }
.cal-days-header { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.cal-days-header span:first-child { color: #ef5350; }
.cal-days-header span:last-child { color: var(--accent); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.day-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; padding: 4px 2px 2px; border-radius: 10px; cursor: pointer; transition: background 0.15s; }
.day-cell:hover { background: rgba(255,255,255,0.05); }
.day-cell.selected { background: rgba(79,195,247,0.12); outline: 1px solid rgba(79,195,247,0.4); }
.day-cell.today .day-num { background: var(--accent); color: #000; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.day-cell.other-month .day-num { color: rgba(255,255,255,0.2); }
.day-num { font-size: 13px; font-weight: 400; line-height: 24px; width: 24px; text-align: center; }
.dot-row { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; justify-content: center; }
.dot { width: 5px; height: 5px; border-radius: 50%; }

.section { padding: 0 1rem 1rem; }
.section-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.filter-tag { background: rgba(79,195,247,0.15); color: var(--accent); border-radius: 20px; padding: 2px 10px; font-size: 11px; cursor: pointer; }

.add-form { background: var(--surface); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; border: 1px solid var(--border); }
.form-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: block; }
.form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 14px; padding: 10px 12px; margin-bottom: 10px; outline: none; transition: border-color 0.2s; }
.form-input:focus { border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.cat-pick { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.cpick { padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 700; border: 2px solid transparent; transition: all 0.15s; opacity: 0.45; }
.cpick.on { opacity: 1; border-color: white; transform: scale(1.08); }

.submit-btn { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
.submit-btn:hover { opacity: 0.85; }

.event-card { background: var(--surface); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border); border-left: 3px solid; }
.ev-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.ev-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
.ev-title { font-size: 14px; font-weight: 500; flex: 1; }
.ev-del { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; }
.ev-meta { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.ev-memo { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 8px; font-style: italic; }

.comments { border-top: 1px solid var(--border); padding-top: 8px; }
.comment-item { font-size: 12px; color: var(--text2); padding: 4px 4px 4px 10px; border-left: 2px solid var(--border); margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.comment-text { flex: 1; }
.comment-del { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; font-size: 12px; padding: 0; line-height: 1; transition: color 0.15s; }
.comment-del:hover { color: #ef5350; }
.comment-form { display: flex; gap: 6px; margin-top: 6px; }
.comment-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 12px; padding: 6px 10px; outline: none; }
.comment-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--accent); font-size: 12px; padding: 6px 12px; cursor: pointer; font-family: inherit; }

.legend { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
.empty { text-align: center; padding: 2rem 0; color: var(--text2); font-size: 13px; }
.loading { text-align: center; padding: 2rem; color: var(--text2); font-size: 13px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; border-radius: 20px; padding: 8px 20px; font-size: 13px; font-weight: 700; display: none; z-index: 999; white-space: nowrap; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">Green <span>Chem</span> 설비 일정표</div>
    <button class="share-btn" onclick="shareLink()">링크 공유</button>
  </div>
  <div class="month-nav">
    <button class="nav-arrow" onclick="changeMonth(-1)">&#8249;</button>
    <span class="month-label" id="month-label"></span>
    <button class="nav-arrow" onclick="changeMonth(1)">&#8250;</button>
  </div>
</div>

<div class="cal-wrap">
  <div class="cal-days-header">
    <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="section">
  <div class="legend" id="legend"></div>
  <div class="add-form">
    <div class="form-label">반응기 선택 *</div>
    <div class="cat-pick" id="cat-pick"></div>
    <label class="form-label">일정 제목 *</label>
    <input class="form-input" id="f-title" placeholder="예: A물질 합성 반응, 세척 및 점검..." />
    <div class="form-row">
      <div>
        <label class="form-label">시작일 *</label>
        <input class="form-input" type="date" id="f-start" />
      </div>
      <div>
        <label class="form-label">종료일 *</label>
        <input class="form-input" type="date" id="f-end" />
      </div>
    </div>
    <div class="form-row">
      <div>
        <label class="form-label">담당자</label>
        <input class="form-input" id="f-who" placeholder="이름" />
      </div>
      <div>
        <label class="form-label">메모</label>
        <input class="form-input" id="f-memo" placeholder="간단한 메모..." />
      </div>
    </div>
    <button class="submit-btn" onclick="addEvent()">+ 일정 추가</button>
  </div>

  <div class="section-title">
    <span id="list-title">이번 달 일정</span>
    <span class="filter-tag" id="filter-tag" style="display:none" onclick="clearFilter()">✕ 필터 해제</span>
  </div>
  <div id="events-list"><div class="loading">불러오는 중...</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB51316UkujU9WeXxl5kJOw21DoTUsagGc",
  authDomain: "green-chem-2ad70.firebaseapp.com",
  projectId: "green-chem-2ad70",
  storageBucket: "green-chem-2ad70.firebasestorage.app",
  messagingSenderId: "313472584854",
  appId: "1:313472584854:web:6b40206db55667632686b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db, "events");

const CATS = [
  { id:"LR1", color:"#4fc3f7", text:"#000" },
  { id:"LR2", color:"#81c784", text:"#000" },
  { id:"LR3", color:"#ffb74d", text:"#000" },
  { id:"LR4", color:"#f48fb1", text:"#000" },
  { id:"PR3", color:"#ce93d8", text:"#000" },
  { id:"PR4", color:"#ef5350", text:"#fff" },
  { id:"PR5", color:"#4db6ac", text:"#000" },
  { id:"PR6", color:"#a5d6a7", text:"#000" },
];

let selCat = CATS[0];
let curY = new Date().getFullYear();
let curM = new Date().getMonth() + 1;
let filterDate = null;
let allEvents = [];

const pad = n => String(n).padStart(2,"0");
const makeDS = (y,m,d) => `${y}-${pad(m)}-${pad(d)}`;

function dateRange(start, end) {
  const dates = [];
  let cur = new Date(start + "T00:00:00");
  const endD = new Date(end + "T00:00:00");
  while (cur <= endD) {
    dates.push(makeDS(cur.getFullYear(), cur.getMonth()+1, cur.getDate()));
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

function buildCatPick() {
  const cp = document.getElementById("cat-pick");
  cp.innerHTML = "";
  CATS.forEach((c,i) => {
    const d = document.createElement("div");
    d.className = "cpick" + (i===0?" on":"");
    d.style.background = c.color;
    d.style.color = c.text;
    d.textContent = c.id;
    d.onclick = () => {
      document.querySelectorAll(".cpick").forEach(x=>x.classList.remove("on"));
      d.classList.add("on");
      selCat = c;
    };
    cp.appendChild(d);
  });
}

function buildLegend() {
  document.getElementById("legend").innerHTML = CATS.map(c=>
    `<div class="leg-item"><div class="leg-dot" style="background:${c.color}"></div>${c.id}</div>`
  ).join("");
}

function renderCalendar() {
  const grid = document.getElementById("cal-grid");
  const today = new Date();
  const firstDay = new Date(curY, curM-1, 1).getDay();
  const daysInMonth = new Date(curY, curM, 0).getDate();
  const prevDays = new Date(curY, curM-1, 0).getDate();
  document.getElementById("month-label").textContent = `${curY}년 ${curM}월`;
  grid.innerHTML = "";

  const addCell = (d, ds, other, isToday) => {
    const cell = document.createElement("div");
    cell.className = "day-cell"+(other?" other-month":"")+(isToday?" today":"")+(filterDate===ds?" selected":"");
    const evs = allEvents.filter(e => dateRange(e.start,e.end).includes(ds));
    const uniq = [...new Map(evs.map(e=>[e.color,e])).values()].slice(0,4);
    const dots = uniq.map(e=>`<div class="dot" style="background:${e.color}"></div>`).join("");
    cell.innerHTML = `<div class="day-num">${d}</div><div class="dot-row">${dots}</div>`;
    cell.onclick = () => { filterDate = filterDate===ds?null:ds; renderAll(); };
    grid.appendChild(cell);
  };

  for (let i=0; i<firstDay; i++) {
    const d = prevDays-firstDay+1+i;
    const m = curM===1?12:curM-1; const y = curM===1?curY-1:curY;
    addCell(d, makeDS(y,m,d), true, false);
  }
  for (let d=1; d<=daysInMonth; d++) {
    const ds = makeDS(curY,curM,d);
    const isToday = today.getFullYear()===curY && today.getMonth()+1===curM && today.getDate()===d;
    addCell(d, ds, false, isToday);
  }
  const rem = 42-firstDay-daysInMonth;
  for (let d=1; d<=rem; d++) {
    const m = curM===12?1:curM+1; const y = curM===12?curY+1:curY;
    addCell(d, makeDS(y,m,d), true, false);
  }
}

function renderList() {
  const list = document.getElementById("events-list");
  const title = document.getElementById("list-title");
  const tag = document.getElementById("filter-tag");
  let filtered;
  if (filterDate) {
    filtered = allEvents.filter(e => dateRange(e.start,e.end).includes(filterDate));
    const d = new Date(filterDate+"T00:00:00");
    const days=["일","월","화","수","목","금","토"];
    title.textContent = `${filterDate} (${days[d.getDay()]})`;
    tag.style.display = "inline";
  } else {
    filtered = allEvents.filter(e => {
      const [sy,sm] = e.start.split("-").map(Number);
      const [ey,em] = e.end.split("-").map(Number);
      return (sy<curY||(sy===curY&&sm<=curM)) && (ey>curY||(ey===curY&&em>=curM));
    });
    title.textContent = `${curM}월 일정`;
    tag.style.display = "none";
  }
  filtered.sort((a,b)=>a.start.localeCompare(b.start));

  if (!filtered.length) { list.innerHTML='<div class="empty">등록된 일정이 없습니다</div>'; return; }

  list.innerHTML = filtered.map(ev => {
    const dateStr = ev.start===ev.end ? ev.start : `${ev.start} ~ ${ev.end}`;
    const cmts = (ev.comments||[]).map((c,ci)=>
      `<div class="comment-item">
        <span class="comment-text">${c}</span>
        <button class="comment-del" onclick="window._delCmt('${ev.id}',${ci})">✕</button>
      </div>`
    ).join("");
    return `<div class="event-card" style="border-left-color:${ev.color}">
      <div class="ev-header">
        <span class="ev-badge" style="background:${ev.color};color:${ev.catText||'#000'}">${ev.cat}</span>
        <span class="ev-title">${ev.title}</span>
        <button class="ev-del" onclick="window._delEv('${ev.id}')">✕</button>
      </div>
      <div class="ev-meta">${dateStr}${ev.who?" · "+ev.who:""}</div>
      ${ev.memo?`<div class="ev-memo">${ev.memo}</div>`:""}
      <div class="comments">
        ${cmts}
        <div class="comment-form">
          <input class="comment-input" id="cmt-${ev.id}" placeholder="댓글 추가..." onkeydown="if(event.key==='Enter')window._addCmt('${ev.id}',this)"/>
          <button class="comment-btn" onclick="window._addCmt('${ev.id}',document.getElementById('cmt-${ev.id}'))">등록</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderAll() { renderCalendar(); renderList(); }

onSnapshot(query(col, orderBy("start")), snap => {
  allEvents = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderAll();
});

window.addEvent = async () => {
  const title = document.getElementById("f-title").value.trim();
  const start = document.getElementById("f-start").value;
  const end = document.getElementById("f-end").value;
  const who = document.getElementById("f-who").value.trim();
  const memo = document.getElementById("f-memo").value.trim();
  if (!title||!start||!end) { showToast("제목과 기간을 입력해주세요"); return; }
  if (end<start) { showToast("종료일이 시작일보다 빠릅니다"); return; }
  await addDoc(col, {title,start,end,who,memo,color:selCat.color,catText:selCat.text,cat:selCat.id,comments:[],createdAt:Date.now()});
  document.getElementById("f-title").value="";
  document.getElementById("f-who").value="";
  document.getElementById("f-memo").value="";
  showToast(`${selCat.id} 일정 추가 완료 ✓`);
};

window._delEv = async id => {
  if (!confirm("이 일정을 삭제할까요?")) return;
  await deleteDoc(doc(db,"events",id));
  showToast("삭제됐습니다");
};

window._addCmt = async (id, input) => {
  const val = input.value.trim(); if (!val) return;
  const ev = allEvents.find(e=>e.id===id); if (!ev) return;
  await updateDoc(doc(db,"events",id), {comments:[...(ev.comments||[]),val]});
  input.value="";
};

window._delCmt = async (id, idx) => {
  const ev = allEvents.find(e=>e.id===id); if (!ev) return;
  const comments = (ev.comments||[]).filter((_,i)=>i!==idx);
  await updateDoc(doc(db,"events",id), {comments});
};

window.changeMonth = d => {
  curM+=d;
  if(curM>12){curM=1;curY++;} if(curM<1){curM=12;curY--;}
  filterDate=null; renderAll();
};
window.clearFilter = () => { filterDate=null; renderAll(); };
window.shareLink = () => {
  navigator.clipboard.writeText(window.location.href)
    .then(()=>showToast("링크 복사됐습니다!"))
    .catch(()=>showToast(window.location.href));
};

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent=msg; t.style.display="block";
  setTimeout(()=>t.style.display="none",2200);
}

const today = new Date();
document.getElementById("f-start").value = makeDS(today.getFullYear(),today.getMonth()+1,today.getDate());
document.getElementById("f-end").value = makeDS(today.getFullYear(),today.getMonth()+1,today.getDate());
buildCatPick(); buildLegend(); renderCalendar();
</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');</script>
</body>
</html>

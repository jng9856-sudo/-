<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --text: #e8eaf6;
  --text2: #90a4ae;
  --border: rgba(255,255,255,0.08);
  --radius: 14px;
  --accent: #4fc3f7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 520px; margin: 0 auto; padding-bottom: 40px; }

.header { background: var(--surface); padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
.app-title { font-size: 16px; font-weight: 700; }
.app-title span { color: var(--accent); }
.share-btn { background: var(--accent); color: #000; border: none; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.month-nav { display: flex; align-items: center; justify-content: space-between; }
.nav-arrow { background: none; border: 1px solid var(--border); color: var(--text); border-radius: 8px; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.month-label { font-size: 15px; font-weight: 500; }

.cal-wrap { padding: 0.75rem 1rem 0.25rem; }
.cal-days-header { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.cal-days-header span:first-child { color: #ef5350; }
.cal-days-header span:last-child { color: var(--accent); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.day-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; padding: 3px 2px 2px; border-radius: 10px; cursor: pointer; transition: background 0.15s; position: relative; }
.day-cell:hover { background: rgba(255,255,255,0.05); }
.day-cell.selected { background: rgba(79,195,247,0.15); outline: 1.5px solid rgba(79,195,247,0.5); }
.day-cell.today .day-num { background: var(--accent); color: #000; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.day-cell.other-month .day-num { color: rgba(255,255,255,0.18); }
.day-cell.holiday .day-num { color: #ef5350 !important; }
.day-cell.today.holiday .day-num { background: #ef5350; color: #fff !important; }
.day-num { font-size: 12px; font-weight: 400; line-height: 22px; width: 22px; text-align: center; }
.holiday-name { font-size: 7px; color: #ef5350; text-align: center; line-height: 1; max-width: 100%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 1px; }
.dot-row { display: flex; gap: 2px; margin-top: 1px; flex-wrap: wrap; justify-content: center; }
.dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }

/* Status */
.status-wrap { padding: 0.5rem 1rem 0.25rem; }
.status-label { font-size: 10px; color: var(--text2); margin-bottom: 5px; }
.status-row { display: flex; gap: 5px; flex-wrap: wrap; }
.status-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; opacity: 0.22; transition: opacity 0.2s; }
.status-badge.active { opacity: 1; }

/* Date panel */
.date-panel { margin: 0 1rem 0.5rem; background: var(--surface); border-radius: var(--radius); border: 1px solid rgba(79,195,247,0.35); overflow: hidden; }
.date-panel-header { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.date-panel-title { font-size: 13px; font-weight: 500; color: var(--accent); }
.date-panel-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; padding: 0; }
.date-panel-body { padding: 6px 10px; }
.date-ev-item { display: flex; align-items: center; gap: 8px; padding: 8px 4px; border-bottom: 1px solid var(--border); }
.date-ev-item:last-child { border-bottom: none; }
.date-ev-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
.date-ev-info { flex: 1; min-width: 0; }
.date-ev-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.date-ev-meta { font-size: 11px; color: var(--text2); margin-top: 1px; }
.date-ev-actions { display: flex; gap: 4px; flex-shrink: 0; }
.date-ev-edit { background: rgba(79,195,247,0.12); border: 1px solid rgba(79,195,247,0.3); color: var(--accent); border-radius: 8px; font-size: 11px; padding: 3px 8px; cursor: pointer; font-family: inherit; }
.date-ev-del { background: rgba(239,83,80,0.12); border: 1px solid rgba(239,83,80,0.3); color: #ef5350; border-radius: 8px; font-size: 11px; padding: 3px 8px; cursor: pointer; font-family: inherit; }
.date-empty { font-size: 13px; color: var(--text2); text-align: center; padding: 1rem 0; }
.holiday-notice { font-size: 11px; color: #ef5350; padding: 6px 4px 2px; }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 1.25rem 1rem 2rem; width: 100%; max-width: 520px; border-top: 1px solid var(--border); }
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 1rem; }
.modal-btns { display: flex; gap: 8px; margin-top: 4px; }
.modal-cancel { flex: 1; background: none; border: 1px solid var(--border); border-radius: 10px; color: var(--text2); padding: 11px; font-size: 14px; cursor: pointer; font-family: inherit; }
.modal-save { flex: 2; background: var(--accent); border: none; border-radius: 10px; color: #000; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

/* Add form */
.section { padding: 0.5rem 1rem 1rem; }
.add-form { background: var(--surface); border-radius: var(--radius); padding: 1rem; border: 1px solid var(--border); }
.form-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: block; }
.form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 14px; padding: 10px 12px; margin-bottom: 10px; outline: none; transition: border-color 0.2s; }
.form-input:focus { border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cat-pick { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.cpick { padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 700; border: 2px solid transparent; transition: all 0.15s; opacity: 0.4; }
.cpick.on { opacity: 1; border-color: white; transform: scale(1.08); }
.submit-btn { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

/* Comments */
.event-card { background: var(--surface); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border); border-left: 3px solid; margin-top: 8px; }
.ev-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.ev-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
.ev-title { font-size: 14px; font-weight: 500; flex: 1; }
.ev-meta { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.ev-memo { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 8px; font-style: italic; }
.comments { border-top: 1px solid var(--border); padding-top: 8px; }
.comment-item { font-size: 12px; color: var(--text2); padding: 4px 4px 4px 10px; border-left: 2px solid var(--border); margin-bottom: 4px; display: flex; gap: 6px; align-items: center; }
.comment-text { flex: 1; }
.comment-del { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; font-size: 12px; padding: 0; transition: color 0.15s; }
.comment-del:hover { color: #ef5350; }
.comment-form { display: flex; gap: 6px; margin-top: 6px; }
.comment-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 12px; padding: 6px 10px; outline: none; }
.comment-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--accent); font-size: 12px; padding: 6px 12px; cursor: pointer; font-family: inherit; }

.watermark { position: fixed; bottom: 10px; right: 14px; font-size: 10px; color: #ffffff; font-family: 'Noto Sans KR', sans-serif; pointer-events: none; z-index: 50; letter-spacing: 0.3px; }
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; border-radius: 20px; padding: 8px 20px; font-size: 13px; font-weight: 700; display: none; z-index: 999; white-space: nowrap; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">Greenchem <span>Pilot</span> 일정표</div>

    <button id="tab-syn" onclick="switchTab('syn')" style="flex:1;background:none;border:none;color:var(--text2);font-family:inherit;font-size:13px;font-weight:500;padding:8px 0;border-bottom:2px solid transparent;cursor:pointer">🧪 합성 예정</button>

<div id="page-schedule">
<div class="cal-wrap">

<div class="status-wrap">

<div class="modal-bg" id="edit-modal" style="display:none" onclick="if(event.target===this)closeEdit()">

</div><!-- /page-schedule -->

<!-- 합성 예정 탭 -->

<div class="watermark">26.04.08. V1_장남규</div>

function dateRange(start,end){
  const dates=[],endD=new Date(end+"T00:00:00");

    const d=document.createElement("div");
    d.className="cpick"+(i===0?" on":"");d.style.background=c.color;d.style.color=c.text;d.textContent=c.id;
    d.onclick=()=>{document.querySelectorAll("#cat-pick .cpick").forEach(x=>x.classList.remove("on"));d.classList.add("on");selCat=c;};
    cp.appendChild(d);
  });
}

function buildEditCatPick(currentCat){
  const cp=document.getElementById("edit-cat-pick");cp.innerHTML="";
  CATS.forEach(c=>{
    const d=document.createElement("div");
    d.className="cpick"+(c.id===currentCat?" on":"");d.style.background=c.color;d.style.color=c.text;d.textContent=c.id;
    d.onclick=()=>{document.querySelectorAll("#edit-cat-pick .cpick").forEach(x=>x.classList.remove("on"));d.classList.add("on");editSelCat=c;};
    cp.appendChild(d);
    if(c.id===currentCat)editSelCat=c;
  });
}

function renderStatusRow(){
  const checkDate=filterDate||todayDS();
  const activeIds=new Set(allEvents.filter(e=>dateRange(e.start,e.end).includes(checkDate)).map(e=>e.cat));
  document.getElementById("status-label").textContent=filterDate?`${filterDate} 가동 현황`:"오늘 가동 현황";
  document.getElementById("status-row").innerHTML=CATS.map(c=>
    `<span class="status-badge${activeIds.has(c.id)?" active":""}" style="background:${c.color};color:${c.text}">${c.id}</span>`
  ).join("");
}

function renderCalendar(){
  const grid=document.getElementById("cal-grid");
  const today=new Date();
  const firstDay=new Date(curY,curM-1,1).getDay();
  const daysInMonth=new Date(curY,curM,0).getDate();
  const prevDays=new Date(curY,curM-1,0).getDate();
  document.getElementById("month-label").textContent=`${curY}년 ${curM}월`;
  grid.innerHTML="";

  const addCell=(d,ds,other,isToday)=>{
    const cell=document.createElement("div");
    const isHoliday=!!HOLIDAYS[ds];
    const isSun=new Date(ds+"T00:00:00").getDay()===0;
    cell.className="day-cell"+(other?" other-month":"")+(isToday?" today":"")+(filterDate===ds?" selected":"")+((isHoliday||isSun)&&!other?" holiday":"");
    const evs=allEvents.filter(e=>dateRange(e.start,e.end).includes(ds));
    const uniq=[...new Map(evs.map(e=>[e.color,e])).values()].slice(0,5);
    const holidayName=HOLIDAYS[ds]?`<div class="holiday-name">${HOLIDAYS[ds]}</div>`:"";
    cell.innerHTML=`<div class="day-num">${d}</div>${holidayName}<div class="dot-row">${uniq.map(e=>`<div class="dot" style="background:${e.color}"></div>`).join("")}</div>`;
    cell.onclick=()=>{filterDate=filterDate===ds?null:ds;renderAll();};
    grid.appendChild(cell);
  };

  for(let i=0;i<firstDay;i++){const d=prevDays-firstDay+1+i,m=curM===1?12:curM-1,y=curM===1?curY-1:curY;addCell(d,makeDS(y,m,d),true,false);}
  for(let d=1;d<=daysInMonth;d++){const ds=makeDS(curY,curM,d);addCell(d,ds,false,today.getFullYear()===curY&&today.getMonth()+1===curM&&today.getDate()===d);}
  const rem=42-firstDay-daysInMonth;
  for(let d=1;d<=rem;d++){const m=curM===12?1:curM+1,y=curM===12?curY+1:curY;addCell(d,makeDS(y,m,d),true,false);}
}

function renderDatePanel(){
  const panel=document.getElementById("date-panel");
  if(!filterDate){panel.style.display="none";return;}
  const d=new Date(filterDate+"T00:00:00");
  const days=["일","월","화","수","목","금","토"];
  const holidayStr=HOLIDAYS[filterDate]?` · ${HOLIDAYS[filterDate]}`:"";
  document.getElementById("date-panel-title").textContent=`${filterDate} (${days[d.getDay()]})${holidayStr}`;
  panel.style.display="block";
  setTimeout(()=>panel.scrollIntoView({behavior:"smooth",block:"nearest"}),50);
  const evs=sortByCat(allEvents.filter(e=>dateRange(e.start,e.end).includes(filterDate)));
  const body=document.getElementById("date-panel-body");
  if(!evs.length){body.innerHTML='<div class="date-empty">이 날 일정이 없습니다</div>';return;}
  body.innerHTML=evs.map(ev=>`
    <div class="date-ev-item">
      <span class="date-ev-badge" style="background:${ev.color};color:${ev.catText||'#000'}">${ev.cat}</span>
      <div class="date-ev-info">
        <div class="date-ev-title">${ev.title}</div>
        <div class="date-ev-meta">${ev.start===ev.end?ev.start:`${ev.start}~${ev.end}`}${ev.who?" · "+ev.who:""}</div>
      </div>
      <div class="date-ev-actions">
        <button class="date-ev-edit" onclick="window._openEdit('${ev.id}')">수정</button>
        <button class="date-ev-del" onclick="window._delEv('${ev.id}')">삭제</button>
      </div>
    </div>`).join("");
}

function renderList(){
  const list=document.getElementById("events-list");
  if(!filterDate){list.innerHTML="";return;}
  const evs=sortByCat(allEvents.filter(e=>dateRange(e.start,e.end).includes(filterDate)));
  if(!evs.length){list.innerHTML="";return;}
  list.innerHTML=evs.map(ev=>{
    const dateStr=ev.start===ev.end?ev.start:`${ev.start} ~ ${ev.end}`;
    const cmts=(ev.comments||[]).map((c,ci)=>
      `<div class="comment-item"><span class="comment-text">${c}</span><button class="comment-del" onclick="window._delCmt('${ev.id}',${ci})">✕</button></div>`
    ).join("");
    return `<div class="event-card" style="border-left-color:${ev.color}">
      <div class="ev-header"><span class="ev-badge" style="background:${ev.color};color:${ev.catText||'#000'}">${ev.cat}</span><span class="ev-title">${ev.title}</span></div>
      <div class="ev-meta">${dateStr}${ev.who?" · "+ev.who:""}</div>
      ${ev.memo?`<div class="ev-memo">${ev.memo}</div>`:""}
      <div class="comments">${cmts}
        <div class="comment-form">
          <input class="comment-input" id="cmt-${ev.id}" placeholder="댓글 추가..." onkeydown="if(event.key==='Enter')window._addCmt('${ev.id}',this)"/>
          <button class="comment-btn" onclick="window._addCmt('${ev.id}',document.getElementById('cmt-${ev.id}'))">등록</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderAll(){renderCalendar();renderStatusRow();renderDatePanel();renderList();}

onSnapshot(query(col,orderBy("start")),snap=>{
  allEvents=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderAll();
});

window.addEvent=async()=>{
  const title=document.getElementById("f-title").value.trim();
  const start=document.getElementById("f-start").value;
  const end=document.getElementById("f-end").value;
  const who=document.getElementById("f-who").value.trim();
  const memo=document.getElementById("f-memo").value.trim();
  if(!title||!start||!end){showToast("제목과 기간을 입력해주세요");return;}
  if(end<start){showToast("종료일이 시작일보다 빠릅니다");return;}
  await addDoc(col,{title,start,end,who,memo,color:selCat.color,catText:selCat.text,cat:selCat.id,comments:[],createdAt:Date.now()});
  document.getElementById("f-title").value="";document.getElementById("f-who").value="";document.getElementById("f-memo").value="";
  showToast(`${selCat.id} 일정 추가 완료 ✓`);
};

window._openEdit=id=>{
  const ev=allEvents.find(e=>e.id===id);if(!ev)return;
  editId=id;buildEditCatPick(ev.cat);
  document.getElementById("e-title").value=ev.title||"";document.getElementById("e-start").value=ev.start||"";
  document.getElementById("e-end").value=ev.end||"";document.getElementById("e-who").value=ev.who||"";
  document.getElementById("e-memo").value=ev.memo||"";document.getElementById("edit-modal").style.display="flex";
};
window.closeEdit=()=>{document.getElementById("edit-modal").style.display="none";editId=null;};
window.saveEdit=async()=>{
  if(!editId)return;
  const title=document.getElementById("e-title").value.trim();
  const start=document.getElementById("e-start").value,end=document.getElementById("e-end").value;
  const who=document.getElementById("e-who").value.trim(),memo=document.getElementById("e-memo").value.trim();
  if(!title||!start||!end){showToast("제목과 기간을 입력해주세요");return;}
  if(end<start){showToast("종료일이 시작일보다 빠릅니다");return;}
  await updateDoc(doc(db,"events",editId),{title,start,end,who,memo,color:editSelCat.color,catText:editSelCat.text,cat:editSelCat.id});
  closeEdit();showToast("수정됐습니다 ✓");
};
window._delEv=async id=>{if(!confirm("이 일정을 삭제할까요?"))return;await deleteDoc(doc(db,"events",id));showToast("삭제됐습니다");};
window._addCmt=async(id,input)=>{
  const val=input.value.trim();if(!val)return;
  const ev=allEvents.find(e=>e.id===id);if(!ev)return;
  await updateDoc(doc(db,"events",id),{comments:[...(ev.comments||[]),val]});input.value="";
};
window._delCmt=async(id,idx)=>{
  const ev=allEvents.find(e=>e.id===id);if(!ev)return;
  await updateDoc(doc(db,"events",id),{comments:(ev.comments||[]).filter((_,i)=>i!==idx)});
};
window.changeMonth=d=>{curM+=d;if(curM>12){curM=1;curY++;}if(curM<1){curM=12;curY--;}filterDate=null;renderAll();};
window.clearFilter=()=>{filterDate=null;renderAll();};
window.shareLink=()=>{navigator.clipboard.writeText(window.location.href).then(()=>showToast("링크 복사됐습니다!")).catch(()=>showToast(window.location.href));};
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",2200);}

window.switchTab=tab=>{
  const isSched=tab==='schedule';
  document.getElementById("page-schedule").style.display=isSched?"block":"none";
  document.getElementById("page-syn").style.display=isSched?"none":"block";
  document.getElementById("month-nav-wrap").style.display=isSched?"flex":"none";
  const tS=document.getElementById("tab-schedule");
  const tN=document.getElementById("tab-syn");
  tS.style.color=isSched?"var(--accent)":"var(--text2)";
  tS.style.borderBottom=isSched?"2px solid var(--accent)":"2px solid transparent";
  tS.style.fontWeight=isSched?"700":"500";
  tN.style.color=isSched?"var(--text2)":"var(--accent)";
  tN.style.borderBottom=isSched?"2px solid transparent":"2px solid var(--accent)";
  tN.style.fontWeight=isSched?"500":"700";
};

// 합성 예정
onSnapshot(query(synCol,orderBy("createdAt")), snap=>{
  const items=snap.docs.map(d=>({id:d.id,...d.data()}));
  const list=document.getElementById("syn-list");
  const count=document.getElementById("syn-count");
  count.textContent=items.length?`${items.length}건`:"";
  if(!items.length){list.innerHTML=`<div style="text-align:center;padding:1.5rem 0;color:var(--text2);font-size:13px">등록된 항목이 없습니다</div>`;return;}
  list.innerHTML=items.map(it=>`
    <div style="background:var(--surface);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);border-left:3px solid var(--accent)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:14px;font-weight:500">${it.name}</span>
        <button onclick="window._delSyn('${it.id}')" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:15px;padding:0 2px">✕</button>
      </div>
      <div style="font-size:11px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap">
        ${it.qty?`<span>목표: ${it.qty}</span>`:""}
        ${it.who?`<span>담당: ${it.who}</span>`:""}
        ${it.date?`<span>일정: ${it.date}</span>`:""}
      </div>
    </div>`).join("");
});

window.addSyn=async()=>{
  const name=document.getElementById("s-name").value.trim();
  if(!name){showToast("물질명을 입력해주세요");return;}
  const qty=document.getElementById("s-qty").value.trim();
  const who=document.getElementById("s-who").value.trim();
  const date=document.getElementById("s-date").value.trim();
  await addDoc(synCol,{name,qty,who,date,createdAt:Date.now()});
  document.getElementById("s-name").value="";
  document.getElementById("s-qty").value="";
  document.getElementById("s-who").value="";
  document.getElementById("s-date").value="";
  showToast("항목 추가됐습니다 ✓");
};
window._delSyn=async id=>{
  if(!confirm("이 항목을 삭제할까요?"))return;
  await deleteDoc(doc(db,"synthesis",id));showToast("삭제됐습니다");
};

const today=new Date();
document.getElementById("f-start").value=makeDS(today.getFullYear(),today.getMonth()+1,today.getDate());
document.getElementById("f-end").value=makeDS(today.getFullYear(),today.getMonth()+1,today.getDate());
buildCatPick();renderCalendar();renderStatusRow();
